version: '3.8'

services:
  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://localhost:4000/api/v1
      - VITE_AUTH_MODE=mock
    volumes:
      - ../apps/frontend/src:/app/src
      - ../packages/shared:/packages/shared
    depends_on:
      - backend

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
      target: dev
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - DATABASE_URL=sqlserver://sa:YourStr0ng!Pass@db:1433;database=portal_aegea;encrypt=true;trustServerCertificate=true
      - AUTH_MODE=mock
      - MOCK_JWT_SECRET=dev-secret-key-change-in-production
    volumes:
      - ../apps/backend/src:/app/src
      - ../packages/shared:/packages/shared
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStr0ng!Pass
    ports:
      # SECURITY: Bind to localhost only - prevents external access to SQL Server
      - '127.0.0.1:1433:1433'
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStr0ng!Pass" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqldata:
