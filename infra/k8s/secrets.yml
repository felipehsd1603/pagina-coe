apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: portal-produtos
  annotations:
    # In production, use Azure Key Vault CSI Driver instead of hardcoded secrets
    # secrets-store.csi.k8s.io/used: "true"
type: Opaque
stringData:
  DATABASE_URL: "<AZURE_SQL_CONNECTION_STRING>"
  MOCK_JWT_SECRET: "<CHANGE_IN_PRODUCTION>"
  AZURE_TENANT_ID: "<TENANT_ID>"
  AZURE_CLIENT_ID: "<CLIENT_ID>"
  AZURE_CLIENT_SECRET: "<CLIENT_SECRET>"
